<main>
  <div *ngIf="!(service.user$ | async)">
    <h1>Login</h1>

    <button mat-raised-button meetGoogleSignin>
      <img src="/assets/google-logo.svg" /> Login com Google
    </button>

    <h5>OU</h5>

    <meet-email-login></meet-email-login>
  </div>

  <div *ngIf="service.user$ | async as user" class="logout">
    <p>
      Logado como <strong>{{ user.email }}</strong>
    </p>

    <button mat-stroked-button (click)="service.signOut()">Logout</button>
  </div>
</main>
